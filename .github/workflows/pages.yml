name: Deploy Docs to Pages

on:
  push:
    branches: master
  workflow_run:
    workflows:
      - Build and Release Ad-Hoc DMG
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    # A workflow_run is associated with the default branch, so it also satisfies
    # the github-pages environment's master-only deployment policy.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve latest version
        id: ver
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE=$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest")
          TAG=$(jq -er '.tag_name' <<< "$RELEASE")
          VERSION="${TAG#v}"
          DMG_NAME="ArcanaCHM-${VERSION}.dmg"
          DMG_URL=$(jq -er --arg name "$DMG_NAME" \
            '.assets[] | select(.name == $name) | .browser_download_url' <<< "$RELEASE")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_url=${DMG_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${VERSION} -> ${DMG_URL}"

      - name: Inject version into index.html
        run: |
          FILE="docs/index.html"
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("${FILE}")
          s = p.read_text(encoding="utf-8")
          s = s.replace("{{VERSION}}", "${{ steps.ver.outputs.version }}")
          # Point every download button (download-btn, download-btn-2, ...) to the exact DMG asset.
          s = re.sub(
              r'(<a[^>]*id="download-btn[^"]*"[^>]*href=")[^"]*(")',
              r'\1${{ steps.ver.outputs.dmg_url }}\2',
              s,
          )
          p.write_text(s, encoding="utf-8")
          print("Injected version ${{ steps.ver.outputs.version }} and DMG URL")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
