name: Deploy Docs to Pages

on:
  push:
    branches: master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Resolve latest version
        id: ver
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$TAG" ]; then
            echo "No git tag found; aborting." >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/ArcanaCHM-${VERSION}.dmg"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dmg_url=${DMG_URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${VERSION} -> ${DMG_URL}"

      - name: Inject version into index.html
        run: |
          FILE="docs/index.html"
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("${FILE}")
          s = p.read_text(encoding="utf-8")
          s = s.replace("{{VERSION}}", "${{ steps.ver.outputs.version }}")
          # Point every download button (download-btn, download-btn-2, ...) to the exact DMG asset.
          s = re.sub(
              r'(<a[^>]*id="download-btn[^"]*"[^>]*href=")[^"]*(")',
              r'\1${{ steps.ver.outputs.dmg_url }}\2',
              s,
          )
          p.write_text(s, encoding="utf-8")
          print("Injected version ${{ steps.ver.outputs.version }} and DMG URL")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
