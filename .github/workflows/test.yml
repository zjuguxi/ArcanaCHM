name: Run Tests
on:
  push:
    branches: master
  pull_request:
    branches: master

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Toolchain
        run: |
          xcodebuild -version
          swift --version
          test "$(tr -d '[:space:]' < VERSION)" = "1.3.8"
      - name: Strict concurrency build
        run: swift build -Xswiftc -strict-concurrency=complete -Xswiftc -warn-concurrency
      - name: Unit and performance tests
        run: swift test

  address-sanitizer:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: swift test --sanitize=address
