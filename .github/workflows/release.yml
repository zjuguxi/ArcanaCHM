name: Build and Release Ad-Hoc DMG

on:
  push:
    tags: 'v*'

permissions: {}

jobs:
  build-release:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      ARCANA_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate tag and toolchain
        run: |
          EXPECTED_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$TAG_VERSION" = "$EXPECTED_VERSION"
          xcodebuild -version
          swift --version

      - name: Test
        run: swift test

      - name: Build ad-hoc signed application
        env:
          APPLE_SIGNING_IDENTITY: '-'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          Scripts/package_app.sh "$VERSION"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          Scripts/package_dmg.sh "$VERSION"

      - name: Create release checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (
            cd dist
            shasum -a 256 "ArcanaCHM-${VERSION}.dmg" > "ArcanaCHM-${VERSION}.dmg.sha256"
          )

      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.dmg
            dist/*.dmg.sha256

      - name: Upload ad-hoc release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ad-hoc-release
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download ad-hoc release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ad-hoc-release
          path: dist

      - name: Verify release checksum
        run: |
          cd dist
          shasum -a 256 -c "ArcanaCHM-${GITHUB_REF_NAME#v}.dmg.sha256"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/ArcanaCHM-${VERSION}.dmg"
          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --verify-tag --generate-notes \
              --notes "This build is ad-hoc signed and is not notarized by Apple. On first launch, right-click ArcanaCHM and choose Open."
          fi
          gh release upload "$GITHUB_REF_NAME" "$DMG" "$DMG.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber
