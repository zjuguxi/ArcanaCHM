name: Build, Sign, Notarize, and Release DMG

on:
  push:
    tags: 'v*'

permissions: {}

jobs:
  build-release:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      REQUIRE_SIGNING: '1'
      ARCANA_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate tag and toolchain
        run: |
          EXPECTED_VERSION="$(tr -d '[:space:]' < VERSION)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$TAG_VERSION" = "$EXPECTED_VERSION"
          xcodebuild -version
          swift --version

      - name: Validate release secrets
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          for name in APPLE_CERTIFICATE_P12 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_TEAM_ID APPLE_APP_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/arcana-signing.keychain-db"
          CERTIFICATE="$RUNNER_TEMP/arcana-signing.p12"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERTIFICATE" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Test
        run: swift test

      - name: Verify release environment
        run: Scripts/verify_release_environment.sh

      - name: Build signed application
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          Scripts/package_app.sh "$VERSION"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          Scripts/package_dmg.sh "$VERSION"

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/ArcanaCHM-${VERSION}.dmg"
          xcrun notarytool submit "$DMG" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG"
          (
            cd dist
            shasum -a 256 "ArcanaCHM-${VERSION}.dmg" > "ArcanaCHM-${VERSION}.dmg.sha256"
          )

      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.dmg
            dist/*.dmg.sha256

      - name: Upload signed release artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release
          path: |
            dist/*.dmg
            dist/*.dmg.sha256
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download signed release artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signed-release
          path: dist

      - name: Verify release checksum
        run: |
          cd dist
          shasum -a 256 -c "ArcanaCHM-${GITHUB_REF_NAME#v}.dmg.sha256"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/ArcanaCHM-${VERSION}.dmg"
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" "$DMG" "$DMG.sha256" --clobber
