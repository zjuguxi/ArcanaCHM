name: Build Release DMG
on:
  push:
    tags: 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift test
      - run: Scripts/package_app.sh
      - name: Create DMG
        run: |
          chmod +x Scripts/package_dmg.sh
          Scripts/package_dmg.sh "${GITHUB_REF_NAME#v}"
      - name: Upload Release Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/ArcanaCHM-*.dmg
          artifactContentType: application/x-apple-diskimage
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitPrereleaseDuringUpdate: true
