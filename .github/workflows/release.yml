name: Build Release DMG
on:
  push:
    tags: 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: swift build -c release
      - run: Scripts/package_app.sh
      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create -volname "ArcanaCHM $VERSION" \
            -srcfolder dist/ArcanaCHM.app \
            -ov -format UDZO \
            "dist/ArcanaCHM-$VERSION.dmg"
      - name: Upload Release Asset
        uses: ncipollo/release-action@v1
        with:
          artifacts: dist/ArcanaCHM-*.dmg
          artifactContentType: application/x-apple-diskimage
          omitBodyDuringUpdate: true
          omitPrereleaseDuringUpdate: true
